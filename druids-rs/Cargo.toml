[workspace]
resolver = "2"
members = [
    "crates/druids-core",
    "crates/druids-server",
    "crates/druids-client",
    "crates/druids-runtime",
    "crates/druids-bridge",
    "crates/druids-db",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
authors = ["Druids Contributors"]
license = "MIT"
repository = "https://github.com/anthropics/druids"

[workspace.dependencies]
# Core async runtime
tokio = { version = "1.41", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time and UUIDs
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["serde", "v4"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }

# Web framework
axum = "0.7"
axum-extra = { version = "0.9", features = ["typed-header"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# HTTP client
reqwest = { version = "0.12", features = ["json", "stream"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# WebSocket
tokio-tungstenite = "0.24"
