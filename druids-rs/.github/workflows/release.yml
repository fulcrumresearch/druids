name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: druids-rs

      - name: Package binaries
        run: |
          cd druids-rs/target/${{ matrix.target }}/release
          tar czf druids-${{ matrix.target }}.tar.gz druids-server druids druids-bridge

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: druids-${{ matrix.target }}
          path: druids-rs/target/${{ matrix.target }}/release/druids-${{ matrix.target }}.tar.gz

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          draft: true
          generate_release_notes: true
